[pytest]
# Test discovery configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Python path configuration
# Add parent directory to import liteusb package
# Add sibling directories for dependencies
pythonpath = 
    ..
    ../python-usb-protocol
    ../migen
    ../litex

# Test output configuration
addopts = 
    -v
    --tb=long
    --strict-markers

# Marker configuration
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    simulation: marks tests that run gateware simulation
    usb2: marks USB 2.0 related tests
    usb3: marks USB 3.0 related tests
    packet: marks packet-level tests
    endpoint: marks endpoint-level tests
    device: marks full-device tests

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Console output
console_output_style = progress

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
